<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Manage Bills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/managebills.css">
</head>
<body class="bg-white text-dark">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark shadow-sm px-3 py-3" style="background: var(--cpesa-maroon);">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="admin.html">
                <img src="../images/cpess.png" alt="School Logo" style="height: 40px; width: auto; margin-right: 10px;" />
                CPESS UBAT PayMonitor
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item">
                        <span class="nav-link" id="currentStudentName"></span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col text-center">
                 <h1 class="m-0">Manage Bills</h1>
            </div>
           
        </div>

        <!-- Bills Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>Bill Name</th>
                        <th>Amount</th>
                        <th>Due Date</th>
                        <th>Expected Amount</th>
                        <th>Accumulated Amount</th>
                    </tr>
                </thead>
                <tbody id="billsTableBody">
                    <!-- Bills will be loaded here dynamically -->
                </tbody>
            </table>
        </div>

         <div class="col-auto d-flex flex-row gap-2 align-items-center">
                <a href="admin.html" class="btn btn-secondary w-100">
                    <i class="fas fa-arrow-left me-1"></i> Back to Admin
                </a>
                <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addBillModal">
                    <i class="fas fa-plus me-1"></i> Add New Bill
                </button>
                <button class="btn btn-warning w-100" onclick="editBill()">
                    <i class="fas fa-edit me-1"></i> Edit Bill
                </button>       
                <button class="btn btn-danger w-100" onclick="deleteBill()">
                    <i class="fas fa-trash me-1"></i> Remove Bill
                </button>
            </div>

    </div>

    <!-- Add Bill Modal -->
    <div class="modal fade" id="addBillModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Bill</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newBillForm">
                        <div class="mb-3">
                            <label for="billName" class="form-label">Bill Name</label>
                            <input type="text" class="form-control" id="billName" required>
                        </div>
                        <div class="mb-3">
                            <label for="billAmount" class="form-label">Amount</label>
                            <input type="number" class="form-control" id="billAmount" required>
                        </div>
                        <div class="mb-3">
                            <label for="dueDate" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="dueDate" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveBillBtn">Add Bill</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Bill Modal -->
    <div class="modal fade" id="editBillModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Bill</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editBillForm">
                        <input type="hidden" id="editBillIndex">
                        <div class="mb-3">
                            <label for="editBillName" class="form-label">Bill Name</label>
                            <input type="text" class="form-control" id="editBillName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editBillAmount" class="form-label">Amount</label>
                            <input type="number" class="form-control" id="editBillAmount" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDueDate" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="editDueDate" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveEditBillBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Bill Modal -->
<div class="modal fade" id="deleteBillModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header" style="background:#6E1F1F; color:white;">
                <h5 class="modal-title">Delete Bill</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p class="mb-0">Are you sure you want to delete this bill?</p>
                <input type="hidden" id="deleteBillIndex">
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>

        </div>
    </div>
</div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/managebills.js"></script>
</body>
</html>
